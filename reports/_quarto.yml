project:
  type: website
  output-dir: _site
  resources:
    - dashboard.html
    - report.html

website:
  title: "BRIM Systems | Quality & Scrap Analytics"
  description: "Cross-system quality pattern analysis for a sheet metal fabricator — Elizabeth, NJ"
  navbar:
    left:
      - href: index.html
        text: Overview
      - href: dashboard.html
        text: Dashboard
      - href: report.html
        text: Report
  page-footer:
    left: "BRIM Systems | Fractional Data Engineering & Analytics"

format:
